<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shopify 密码设置</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --bg: #ffffff;
        --panel: #ffffff;
        --text: #1c281f;
        --muted: #66756a;
        --accent: #1f6a42;
        --accent-strong: #164d31;
        --line: #d8dfd7;
        --line-strong: #c4cec5;
        --soft: #f4f7f4;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-width: 420px;
        max-width: 540px;
        color: var(--text);
        background: var(--bg);
      }
      .shell {
        padding: 0 16px 16px;
      }
      .masthead {
        padding: 16px 0 14px;
        border-bottom: 1px solid var(--line);
        margin-bottom: 14px;
      }
      .masthead h1 {
        margin: 0 0 4px;
        font-size: 15px;
        line-height: 1.25;
        font-weight: 700;
      }
      .masthead p {
        margin: 0;
        font-size: 12.5px;
        line-height: 1.55;
        color: var(--muted);
      }
      .grid {
        display: grid;
        gap: 0;
      }
      .section {
        padding: 14px 0 16px;
        border-top: 1px solid var(--line);
      }
      .section:first-child {
        border-top: 0;
        padding-top: 0;
      }
      .section-heading {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 10px;
        min-width: 0;
      }
      .section-heading h2 {
        margin: 0;
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        flex: 0 1 auto;
        min-width: 0;
        color: var(--muted);
      }
      .section-heading .heading-meta {
        flex: 1 1 auto;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 12px;
        color: var(--text);
      }
      .field {
        display: grid;
        gap: 6px;
      }
      .field label {
        font-size: 12px;
        color: var(--muted);
      }
      .field input {
        width: 100%;
        padding: 10px 11px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--text);
        font: inherit;
      }
      .field input:focus {
        outline: none;
        border-color: var(--accent);
      }
      .field input:disabled {
        background: var(--soft);
        color: #6f8175;
      }
      .input-action {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
      }
      .input-action button {
        min-width: 58px;
        padding: 9px 12px;
        border-radius: 6px;
        box-shadow: none;
      }
      .hint {
        margin: 12px 0 0;
        font-size: 12px;
        line-height: 1.55;
        color: var(--muted);
      }
      .radio-group {
        display: grid;
        gap: 8px;
      }
      .radio-option {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 10px 12px;
        align-items: start;
        padding: 10px 11px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        cursor: pointer;
        transition:
          border-color 120ms ease,
          background 120ms ease;
      }
      .radio-option input {
        margin: 2px 0 0;
      }
      .radio-option .radio-copy {
        min-width: 0;
      }
      .radio-option strong {
        display: block;
        font-size: 12.5px;
        line-height: 1.35;
      }
      .radio-option .radio-copy-text {
        display: block;
        margin-top: 3px;
        font-size: 11.5px;
        line-height: 1.45;
        color: var(--muted);
      }
      .radio-option .nested-field {
        grid-column: 2;
        margin: 2px 0 0;
        min-width: 0;
      }
      .radio-option .nested-field[hidden] {
        display: none;
      }
      .radio-option .nested-field .input-action {
        grid-template-columns: minmax(0, 1fr) auto;
      }
      .radio-option:hover {
        border-color: var(--line-strong);
        background: var(--soft);
      }
      .radio-option.is-selected {
        border-color: var(--accent);
        background: #f7fbf8;
      }
      .stat {
        padding: 12px;
        border-radius: 6px;
        background: var(--soft);
        border: 1px solid var(--line);
        font-size: 12.5px;
        line-height: 1.55;
      }
      .stat-wrap {
        margin-top: 12px;
        margin-bottom: 12px;
      }
      .stat strong {
        color: var(--accent-strong);
      }
      button {
        appearance: none;
        border: 1px solid var(--accent);
        border-radius: 6px;
        padding: 10px 14px;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-size: 12.5px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: none;
      }
      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="masthead">
        <h1>Shopify 密码设置</h1>
        <p>在这里设置默认密码和单店密码。密码页自动登录会优先使用这里的设置。</p>
      </section>

      <div class="grid">
        <section class="section">
          <div class="section-heading">
            <h2>当前店铺</h2>
            <div class="heading-meta"><strong id="currentHostname">正在读取...</strong></div>
          </div>

          <form id="siteForm">
            <div class="stat-wrap">
              <div class="stat" id="siteStat">正在读取当前店铺设置...</div>
            </div>

            <div class="field">
              <label>登录方式</label>
              <div class="radio-group" id="sitePasswordSource">
                <label class="radio-option">
                  <input type="radio" name="sitePasswordSource" value="global" checked>
                  <span class="radio-copy">
                    <strong>使用默认密码</strong>
                    <span class="radio-copy-text">适合大多数共用同一密码的店铺。</span>
                  </span>
                </label>

                <label class="radio-option">
                  <input type="radio" name="sitePasswordSource" value="manual">
                  <span class="radio-copy">
                    <strong>手动处理</strong>
                    <span class="radio-copy-text">不会自动尝试密码，需要时你再手动输入。</span>
                  </span>
                </label>

                <label class="radio-option">
                  <input type="radio" name="sitePasswordSource" value="custom">
                  <div class="radio-copy">
                      <strong>使用单店密码</strong>
                      <span class="radio-copy-text">为当前店铺单独设置一个密码。</span>
                  </div>
                  <div class="nested-field" id="sitePasswordField" hidden>
                    <div class="input-action">
                      <input id="sitePassword" type="text" autocomplete="off" spellcheck="false">
                      <button id="saveSiteButton" type="button">保存</button>
                    </div>
                  </div>
                </label>
              </div>
            </div>
          </form>
        </section>

        <section class="section">
          <div class="section-heading">
            <h2>默认密码</h2>
          </div>
          <div class="field">
            <label for="globalDefaultPassword">给未单独设置的店铺使用</label>
            <div class="input-action">
              <input id="globalDefaultPassword" type="text" autocomplete="off" spellcheck="false">
              <button id="saveGlobalButton" type="button">保存</button>
            </div>
          </div>
          <p class="hint">按回车或点击保存后立即生效。密码页自动登录会优先使用这里的值。</p>
        </section>
      </div>
    </div>

    <script src="src/popup.js"></script>
  </body>
</html>
